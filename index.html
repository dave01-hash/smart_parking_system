# index.html

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Parking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<header class="topbar">
<div><h1>Smart Parking</h1><p id="greeting">Welcome Driver 👋</p></div>
<div class="badge">LIVE</div>
</header>
<section class="grid cards">
<div class="card"><span>Available Slots</span><h2 id="slots">1</h2></div>
<div class="card"><span>Gate Status</span><h2 id="gate">Closed</h2></div>
<div class="card"><span>Occupancy</span><h2 id="occ">1 / 2</h2></div>
</section>
<section class="card map">
<h3>Parking Map</h3>
<div class="slots">
<div id="a1" class="slot free">A1 Available</div>
<div id="a2" class="slot busy">A2 Occupied</div>
</div>
</section>
<section class="actions">
<button onclick="toggleGate()">Toggle Gate</button>
<button onclick="simulate()">Simulate Sensor</button>
</section>
</div>
<script src="script.js"></script>
</body>
</html>
