<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Parking System</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <header>
        <h1>Smart Parking System</h1>
        <p>ESP32 + Blynk Live Dashboard</p>
    </header>

    <section class="grid">

        <div class="card">
            <h2>Parking Slot</h2>
            <div id="slotStatus" class="status available">AVAILABLE</div>
            <small>1 Slot | 2 IR Sensors</small>
        </div>

        <div class="card">
            <h2>Gate Status</h2>
            <div id="gateStatus" class="gate closed">CLOSED</div>
        </div>

        <div class="card">
            <h2>Statistics</h2>
            <p>Available Slots: <span id="availableCount">1</span></p>
            <p>Occupied: <span id="occupiedCount">0</span></p>
        </div>

    </section>

    <section class="controls">
        <button id="gateBtn">Open Gate</button>
    </section>

    <footer>
        Powered by ESP32 + Blynk + GitHub Pages
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
