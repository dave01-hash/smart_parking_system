<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Parking</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<div class="container">

<header class="hero">

<p class="mini">SMART PARKING SYSTEM</p>

<h1>Smart Parking</h1>

<p class="subtitle">Luxury Real-Time Parking Dashboard</p>

<div class="topbar">
<div id="clock">--:--</div>
<div id="liveBadge" class="badge offline">Offline</div>
</div>

</header>

<section class="grid">

<div class="card">
<h3>Parking Slot</h3>

<div id="slotBox" class="slot free">AVAILABLE</div>

<p id="slotText">1 Slot • Dual IR Detection</p>
</div>

<div class="card">
<h3>Gate Control</h3>

<div id="gateBox" class="gate closed">CLOSED</div>

<button onclick="toggleGate()" class="mainBtn">
Open Gate
</button>
</div>

<div class="card">
<h3>Live Stats</h3>

<div class="stats">

<div class="stat">
<h2 id="available">1</h2>
<p>Available</p>
</div>

<div class="stat">
<h2 id="occupied">0</h2>
<p>Occupied</p>
</div>

</div>
</div>

</section>

<footer>
ESP32 • Blynk • GitHub Pages
</footer>

</div>

<script src="script.js"></script>

</body>
</html>
