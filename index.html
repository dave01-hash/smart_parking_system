/* index.html */
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Parking Premium</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>
<body>

<div class="bg-blur one"></div>
<div class="bg-blur two"></div>

<div class="container">

    <header>
        <h1>Smart Parking</h1>
        <p>Luxury Real-Time Parking Dashboard</p>
    </header>

    <section class="grid">

        <div class="card premium-card">
            <h2>Parking Slot</h2>
            <div id="slotStatus" class="badge green">AVAILABLE</div>
            <small>1 Slot • Dual IR Detection</small>
        </div>

        <div class="card premium-card">
            <h2>Gate Control</h2>
            <div id="gateStatus" class="badge red">CLOSED</div>
            <button id="gateBtn">Open Gate</button>
        </div>

        <div class="card premium-card">
            <h2>Live Stats</h2>
            <div class="stats">
                <div>
                    <span id="availableCount">1</span>
                    <small>Available</small>
                </div>

                <div>
                    <span id="occupiedCount">0</span>
                    <small>Occupied</small>
                </div>
            </div>
        </div>

    </section>

    <footer>
        ESP32 • Blynk • GitHub Pages
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
